<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Emissions Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 40px;
            color: #888;
            font-size: 1.1rem;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #ff6b6b;
            background: rgba(255, 255, 255, 0.12);
        }

        input::placeholder {
            color: #666;
        }

        .calculate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }

        .calculate-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .results-section {
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .journey-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .journey-info h2 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #feca57;
        }

        .distance {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
        }

        .distance-unit {
            font-size: 1rem;
            color: #888;
        }

        .transport-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .transport-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .transport-card.worst {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2), rgba(238, 90, 36, 0.2));
            border-color: #ff6b6b;
            transform: scale(1.02);
        }

        .transport-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .transport-icon {
            font-size: 2rem;
        }

        .transport-name {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .transport-right {
            text-align: right;
        }

        .emissions {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
        }

        .emissions-unit {
            font-size: 0.9rem;
            color: #888;
        }

        .recommendation-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .fire-emoji {
            font-size: 1.2rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .error {
            background: rgba(255, 107, 107, 0.2);
            border: 2px solid #ff6b6b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .distance {
                font-size: 2rem;
            }

            .transport-card {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .transport-left, .transport-right {
                width: 100%;
                justify-content: center;
            }

            .transport-right {
                text-align: center;
            }
        }

        /* Cookie Banner */
        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid rgba(255, 107, 107, 0.3);
            padding: 25px;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.5s ease;
        }

        .cookie-banner.show {
            transform: translateY(0);
        }

        .cookie-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .cookie-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #feca57;
        }

        .cookie-text {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .cookie-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .cookie-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cookie-btn-accept {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: #fff;
        }

        .cookie-btn-accept:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
        }

        .cookie-btn-decline {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
            position: relative;
            transition: none;
        }

        /* Scientific Date Picker Styles */
        .date-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        #datePicker {
            display: flex;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
            position: absolute;
            z-index: 99;
            background-color: rgba(0, 0, 0, 0.95);
            border-radius: 60px 0px 60px 60px;
            clip-path: circle(0% at 100% 0%);
            transition: clip-path 0.7s;
            cursor: grab;
            margin-top: 10px;
        }

        #datePicker svg {
            width: 100%;
        }

        #date {
            width: 100%;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #date:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        #date .date-display {
            color: #ccc;
        }

        #date input[type="checkbox"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            border: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            opacity: 0;
        }

        #date input[type="checkbox"]:checked ~ #datePicker {
            clip-path: circle(150% at 100% 100%);
        }

        #date .future {
            color: #ff6b6b !important;
            font-size: 0.8rem !important;
        }

        .date-icon {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Carbon Calculator</h1>
        <p class="subtitle">Find the most exciting way to travel! 🔥</p>

        <div class="input-section">
            <div class="form-group">
                <label for="origin">Origin</label>
                <input type="text" id="origin" placeholder="e.g., London">
            </div>
            <div class="form-group">
                <label for="destination">Destination</label>
                <input type="text" id="destination" placeholder="e.g., Edinburgh">
            </div>
            <div class="form-group">
                <label for="date">Departure Date</label>
                <div class="date-wrapper">
                    <button id="date">
                        <span class="date-display">Select Date</span>
                        <span class="date-icon">🌍</span>
                        <input type="checkbox">
                        <div id="datePicker">
                            <svg viewBox="0 0 350 166">
                                <ellipse id="ellipse" cx="175" cy="83" rx="150" ry="73"
                                style="fill-opacity: 0;stroke:yellow;stroke-width:0.5" />
                                <image id="earth" height="15" width="15" href="https://raw.githubusercontent.com/i01000101/RedditBadUIBattles/main/ScientificDatePicker/earth.png"></image>
                                <image id="sun" x="105" y="68" height="30" width="30" href="https://raw.githubusercontent.com/i01000101/RedditBadUIBattles/main/ScientificDatePicker/sun.png"></image>
                            </svg>
                        </div>
                    </button>
                </div>
            </div>
            <button class="calculate-btn" id="calculateBtn">Calculate Emissions</button>
        </div>

        <div id="errorContainer"></div>

        <div class="results-section" id="resultsSection">
            <div class="journey-info">
                <h2>Journey Distance</h2>
                <div class="distance" id="distanceValue">0</div>
                <span class="distance-unit">kilometres</span>
            </div>

            <div class="transport-list" id="transportList"></div>
        </div>
    </div>

    <!-- Cookie Banner -->
    <div class="cookie-banner" id="cookieBanner">
        <div class="cookie-content">
            <div class="cookie-title">🍪 We Love Cookies!</div>
            <p class="cookie-text">We use cookies to enhance your experience and calculate your carbon guilt. By continuing, you agree to our cookie policy.</p>
            <div class="cookie-buttons">
                <button class="cookie-btn cookie-btn-accept" id="acceptCookies">Accept All</button>
                <button class="cookie-btn cookie-btn-decline" id="declineCookies">Decline</button>
            </div>
        </div>
    </div>

    <script>
        // Transport modes with emission factors (g CO2 per passenger-km)
        const transportModes = [
            { name: 'Walking', icon: '🚶', factor: 0 },
            { name: 'Cycling', icon: '🚴', factor: 0 },
            { name: 'High-speed Train', icon: '🚄', factor: 6 },
            { name: 'Electric Bus', icon: '🚌', factor: 17 },
            { name: 'Tram', icon: '🚋', factor: 20 },
            { name: 'Bus', icon: '🚍', factor: 18 },
            { name: 'Electric Train', icon: '🚂', factor: 29 },
            { name: 'Train', icon: '🚆', factor: 41 },
            { name: 'Motorcycle', icon: '🏍️', factor: 120 },
            { name: 'Horse & Carriage', icon: '🐴', factor: 120 },
            { name: 'Long-distance Coach', icon: '🚎', factor: 105 },
            { name: 'Diesel Car', icon: '🚗', factor: 171 },
            { name: 'Petrol Car', icon: '🚙', factor: 243 },
            { name: 'Short-haul Flight', icon: '✈️', factor: 255 },
            { name: 'Long-haul Flight', icon: '🛫', factor: 150 },
            { name: 'Cruise Ship', icon: '🚢', factor: 250 },
            { name: 'Killdozer', icon: '🚜', factor: 800 }
        ];

        // DOM Elements
        const originInput = document.getElementById('origin');
        const destinationInput = document.getElementById('destination');
        const calculateBtn = document.getElementById('calculateBtn');
        const resultsSection = document.getElementById('resultsSection');
        const distanceValue = document.getElementById('distanceValue');
        const transportList = document.getElementById('transportList');
        const errorContainer = document.getElementById('errorContainer');

        // Geocode a location using Nominatim API
        async function geocode(location) {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}`;
            const response = await fetch(url, {
                headers: {
                    'User-Agent': 'CarbonCalculator/1.0'
                }
            });
            const data = await response.json();

            if (data.length === 0) {
                throw new Error(`Location "${location}" not found`);
            }

            return {
                lat: parseFloat(data[0].lat),
                lon: parseFloat(data[0].lon)
            };
        }

        // Calculate distance between two coordinates using Haversine formula
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's radius in km
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);

            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);

            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function toRad(degrees) {
            return degrees * (Math.PI / 180);
        }

        // Calculate emissions for all transport modes
        function calculateEmissions(distance) {
            return transportModes.map(mode => ({
                ...mode,
                emissions: Math.round(distance * mode.factor)
            })).sort((a, b) => b.emissions - a.emissions); // Sort by highest emissions first
        }

        // Format emissions to show kg if >= 1000g
        function formatEmissions(emissions) {
            if (emissions >= 1000) {
                const kg = (emissions / 1000).toFixed(1);
                const decimalPart = kg.split('.')[1];
                return {
                    value: decimalPart === '0' ? Math.round(emissions / 1000) : kg,
                    unit: 'kg CO₂'
                };
            }
            return {
                value: emissions.toLocaleString(),
                unit: 'g CO₂'
            };
        }

        // Display results
        function displayResults(distance, results) {
            distanceValue.textContent = Math.round(distance).toLocaleString();

            transportList.innerHTML = '';

            results.forEach((mode, index) => {
                const isWorst = index === 0 && mode.emissions > 0;
                const formatted = formatEmissions(mode.emissions);

                const card = document.createElement('div');
                card.className = `transport-card${isWorst ? ' worst' : ''}`;

                card.innerHTML = `
                    <div class="transport-left">
                        <span class="transport-icon">${mode.icon}</span>
                        <span class="transport-name">${mode.name}</span>
                    </div>
                    <div class="transport-right">
                        <div class="emissions">${formatted.value}</div>
                        <span class="emissions-unit">${formatted.unit}</span>
                        ${isWorst ? '<div class="recommendation-badge"><span class="fire-emoji">🔥</span> MOST EXCITING!</div>' : ''}
                    </div>
                `;

                transportList.appendChild(card);
            });

            resultsSection.classList.add('show');
        }

        // Show error message
        function showError(message) {
            errorContainer.innerHTML = `<div class="error">${message}</div>`;
        }

        // Clear error message
        function clearError() {
            errorContainer.innerHTML = '';
        }

        // Handle calculate button click
        async function handleCalculate() {
            const origin = originInput.value.trim();
            const destination = destinationInput.value.trim();

            clearError();
            resultsSection.classList.remove('show');

            if (!origin || !destination) {
                showError('Please enter both origin and destination');
                return;
            }

            calculateBtn.disabled = true;
            calculateBtn.textContent = 'Calculating...';

            try {
                const originCoords = await geocode(origin);
                const destCoords = await geocode(destination);

                const distance = calculateDistance(
                    originCoords.lat, originCoords.lon,
                    destCoords.lat, destCoords.lon
                );

                const results = calculateEmissions(distance);
                displayResults(distance, results);

            } catch (error) {
                showError(error.message);
            } finally {
                calculateBtn.disabled = false;
                calculateBtn.textContent = 'Calculate Emissions';
            }
        }

        // Event listeners
        calculateBtn.addEventListener('click', handleCalculate);

        // Allow Enter key to trigger calculation
        originInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleCalculate();
        });

        destinationInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleCalculate();
        });

        // Scientific Date Picker Logic
        /*
          The formula I use is not the scientifically best formula.
          If you want more correct result use Kepler's laws.
          Also I use center of circumcircle of ellipse because
          orbit of the earth is not too much ellipse, it's almost a circle
          and Sun is almost in the middle of the circle, you can use center of ellipse
        */

        const earth = document.getElementById("earth");
        const dateButton = document.getElementById("date");
        const datePicker = document.getElementById("datePicker");
        const ellipse = document.getElementById("ellipse");
        const dateDisplay = dateButton.querySelector('.date-display');

        let isPressing = false;

        const earthSize = 15;
        const horizontalRadius = 150;
        const verticalRadius = 73;
        const horizontalMargin = 25;
        const verticalMargin = 10;

        let today = new Date();
        let year = today.getFullYear();
        let start = new Date(today.getFullYear(), 0, 0);
        let diff = today - start;
        const oneDay = 1000 * 60 * 60 * 24;
        let dayNumber = Math.floor(diff / oneDay);
        let date = dateFromDay(dayNumber);
        dateDisplay.textContent = addZero(date.getDate()) + "/" + addZero(date.getMonth()+1) + "/" + date.getFullYear();

        let angle = 2*Math.asin(((dayNumber-1)/(182.5 + (isLeapyear()?0.5:0)))-1);
        let x = horizontalRadius*Math.cos(angle);
        let y = verticalRadius*Math.sin(angle);

        earth.setAttribute("x", horizontalRadius + x - earthSize/2 + horizontalMargin);
        earth.setAttribute("y", verticalRadius - y - earthSize/2 + verticalMargin);

        earth.addEventListener("mousedown", mousedown);
        earth.addEventListener("touchstart", mousedown);

        addEventListener("mousemove", mousemove);
        addEventListener("touchmove", mousemove);

        addEventListener("mouseup", mouseup);
        addEventListener("touchend", mouseup);

        const dateButtonRect = dateButton.getBoundingClientRect();
        datePicker.style.top = dateButtonRect.height + "px";
        datePicker.style.right = 0;
        dateButton.style.height = dateButtonRect.height + "px";

        function mousedown(e) {
            isPressing = true;
        }

        function mousemove(e) {
            if(!isPressing) return;

            const { clientX, clientY } = e.touches != null ? e.touches[0] : e;

            const rect = ellipse.getBoundingClientRect();
            const ellipseCenterX = rect.x + rect.width/2 + horizontalMargin;
            const ellipseCenterY = rect.y + rect.height/2 + verticalMargin;
            angle = Math.atan2(ellipseCenterY - clientY, clientX - ellipseCenterX);

            let x = horizontalRadius*Math.cos(angle);
            let y = verticalRadius*Math.sin(angle);

            earth.setAttribute("x", horizontalRadius + x - earthSize/2 + horizontalMargin);
            earth.setAttribute("y", verticalRadius - y - earthSize/2 + verticalMargin);

            let oldDate = date;

            let dayNumber = ((182.5 + (isLeapyear()?0.5:0))*(Math.sin((angle)/2) + 1) + 1);

            date = dateFromDay(dayNumber);

            if(oldDate.getDate() == 1 && oldDate.getMonth() == 0 && date.getDate() == 31 && date.getMonth() == 11){
                year--;
            }else if(oldDate.getDate() == 31 && oldDate.getMonth() == 11 && date.getDate() == 1 && date.getMonth() == 0){
                year++;
            }

            dayNumber = ((182.5 + (isLeapyear()?0.5:0))*(Math.sin((angle)/2)+1)+1);
            date = dateFromDay(dayNumber);

            dateDisplay.classList.remove("future");
            dateDisplay.textContent = addZero(date.getDate()) + "/" + addZero(date.getMonth() + 1) + "/" + date.getFullYear();
        }

        function dateFromDay(day){
            let d = new Date(year, 0);
            return new Date(d.setDate(day));
        }

        function mouseup(e) {
            isPressing = false;
        }

        function addZero(num){
            return num<10?"0"+num:num;
        }

        function isLeapyear(){
            return (year % 100 === 0) ? (year % 400 === 0) : (year % 4 === 0);
        }

        // Close date picker when clicking outside
        document.addEventListener('click', (e) => {
            if (!dateButton.contains(e.target)) {
                dateButton.querySelector('input[type="checkbox"]').checked = false;
            }
        });

        // Cookie Banner
        const cookieBanner = document.getElementById('cookieBanner');
        const acceptCookies = document.getElementById('acceptCookies');
        const declineCookies = document.getElementById('declineCookies');

        // Show cookie banner after a delay
        setTimeout(() => {
            cookieBanner.classList.add('show');
        }, 1500);

        // Accept cookies
        acceptCookies.addEventListener('click', () => {
            cookieBanner.classList.remove('show');
            localStorage.setItem('cookiesAccepted', 'true');
        });

        // Decline button runs away from cursor
        declineCookies.addEventListener('mouseover', (e) => {
            const btn = e.target;
            const rect = btn.getBoundingClientRect();
            const maxX = window.innerWidth - rect.width - 20;
            const maxY = window.innerHeight - rect.height - 20;

            const randomX = Math.max(20, Math.random() * maxX);
            const randomY = Math.max(20, Math.random() * maxY);

            btn.style.position = 'fixed';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
            btn.style.zIndex = '1001';
        });

        // Also make it run away on touch
        declineCookies.addEventListener('touchstart', (e) => {
            const btn = e.target;
            const maxX = window.innerWidth - btn.offsetWidth - 20;
            const maxY = window.innerHeight - btn.offsetHeight - 20;

            const randomX = Math.max(20, Math.random() * maxX);
            const randomY = Math.max(20, Math.random() * maxY);

            btn.style.position = 'fixed';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
            btn.style.zIndex = '1001';
        });
    </script>
</body>
</html>
